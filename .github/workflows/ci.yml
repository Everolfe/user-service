name: User Service CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: user_card_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Wait for services to be ready
        run: |
          timeout 30s sh -c 'until nc -z localhost 5432; do sleep 2; done'
          timeout 30s sh -c 'until nc -z localhost 6379; do sleep 2; done'

      - name: Build and Test with Maven
        env:
          # Test profile configuration
          SPRING_PROFILES_ACTIVE: test
          # Database
          L_DB_USERNAME: postgres
          L_DB_PASSWORD: postgres
          L_DB_HOST_PORT: 5432
          L_DB_NAME: user_card_db
          # Redis
          REDIS_PORT: 6379
          # App
          APP_PORT: 8081
          LIQUIBASE_ENABLE: false
        run: ./mvnw clean verify --no-transfer-progress

      - name: Analyze with SonarCloud
        if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/userservice:latest
            ${{ secrets.DOCKER_USERNAME }}/userservice:${{ github.run_id }}