name: User Service CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build and Test with Maven
        run: ./mvnw clean verify
        env:
          SPRING_PROFILES_ACTIVE: test  # <-- ВАЖНО!
          TESTCONTAINERS_REUSE_ENABLE: false
          TESTCONTAINERS_LOG_LEVEL: WARN

      - name: Analyze with SonarCloud
        if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/userservice:latest
            ${{ secrets.DOCKER_USERNAME }}/userservice:${{ github.run_id }}