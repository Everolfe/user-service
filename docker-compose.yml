services:
  postgres-db:
    image: "postgres:15-alpine"
    container_name: "user-service-db"
    environment:
      POSTGRES_DB : ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: "redis:7.2-alpine"
    container_name: user-service-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service-app:
    container_name: user-service-app
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_PORT: ${APP_PORT}
      D_DB_USERNAME: ${DB_USERNAME}
      D_DB_PASSWORD: ${DB_PASSWORD}
      D_DB_HOST_PORT: ${DB_HOST_PORT}
      D_DB_NAME: ${DB_NAME}
      REDIS_HOST: redis-cache
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
