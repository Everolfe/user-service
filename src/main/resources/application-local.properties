server.port=${APP_PORT}

spring.datasource.username=${L_DB_USERNAME}
spring.datasource.password=${L_DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:${L_DB_HOST_PORT}/${L_DB_NAME}

spring.data.redis.host=localhost
spring.data.redis.port=${REDIS_PORT}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8082/api/auth/well-known/jwks.json